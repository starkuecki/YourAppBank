spring:
  application:
    name: BankingBackend

  jackson:
    deserialization:
      fail-on-ignored-properties: true
      fail-on-unknown-properties: true

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./.database/data
    username: user
    password: password

  h2:
    console:
      path: /h2-console
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: DEBUG
    de.raywo.banking: DEBUG