<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History · Booby Bank</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-root"></aside>

    <main class="main">
      <div class="page-header">
        <h1>History 📋</h1>
      </div>

      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-input-wrap__icon" id="search-icon"></span>
          <input type="text" id="search-input" placeholder="Search transactions..." />
        </div>
        <button class="filter-btn"><span id="filter-icon"></span> Filter</button>
      </div>

      <div class="category-pills" id="category-pills"></div>

      <div class="history-list" id="history-list"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
