<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Booby Bank</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-root"></aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Hey there 👋, <span id="greet-name">Martin</span></h1>
          <p class="page-header__subtitle" id="today-line">Thursday, June 18 · Here's your money overview</p>
        </div>
        <button class="btn btn--primary" id="new-transfer-btn">
          <span data-icon="plus" style="display:flex"></span>
          New Transfer
        </button>
      </div>

      <section class="account-cards" id="account-cards"></section>

      <section class="quick-actions">
        <button class="btn btn--outline">
          <span class="btn__icon-circle" data-icon="send"></span> Send
        </button>
        <button class="btn btn--outline">
          <span class="btn__icon-circle" data-icon="plus"></span> Add Money
        </button>
        <button class="btn btn--outline">
          <span class="btn__icon-circle" data-icon="bolt"></span> Pay Bill
        </button>
        <button class="btn btn--outline">
          <span class="btn__icon-circle" data-icon="dots"></span> More
        </button>
      </section>

      <section class="dashboard-grid">
        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">Overview</span>
            <div class="toggle-group">
              <button class="toggle-group__btn is-active" data-view="balance">Balance</button>
              <button class="toggle-group__btn" data-view="cashflow">Cash Flow</button>
            </div>
          </div>
          <div id="chart-root"></div>
        </div>

        <div class="panel">
          <div class="panel__header">
            <span class="panel__title">Recent</span>
            <a class="panel__link" href="history.html">See all →</a>
          </div>
          <div class="tx-list" id="recent-tx-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
