<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Money · Booby Bank</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-root"></aside>

    <main class="main">
      <div class="page-header">
        <h1>Send Money 🚀</h1>
      </div>

      <section class="send-grid">
        <form id="send-form">
          <div class="field-block">
            <label class="field-label">From</label>
            <select class="select-box" id="from-account"></select>
          </div>

          <div class="field-block">
            <label class="field-label">To</label>
            <div class="recipient-list" id="recipient-list"></div>
          </div>

          <div class="field-block">
            <label class="field-label">Amount</label>
            <div class="amount-input-wrap">
              <span class="currency-prefix">$</span>
              <input type="number" id="amount-input" placeholder="0.00" min="0" step="0.01" />
            </div>
          </div>

          <div class="field-block">
            <label class="field-label">Note (optional)</label>
            <input type="text" class="text-input" id="note-input" placeholder="What's this for? 🍕" />
          </div>

          <button type="submit" class="btn btn--disabled send-submit" id="send-submit-btn" disabled>
            Send Money →
          </button>
        </form>

        <aside>
          <div class="panel__title" style="margin-bottom:16px;">Recent</div>
          <div class="recent-transfers" id="recent-transfers"></div>

          <div class="info-callout">
            <div class="info-callout__title">Quick info 👀</div>
            <div class="info-callout__line">Domestic: instant &amp; free 🎉</div>
            <div class="info-callout__line">International: 1-2 days, 0.5% fee (min $2)</div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/send-money.js"></script>
</body>
</html>
